<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <<style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #2232dc, #3e3ee7);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .login-box {
      width: 320px;
      padding: 25px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      text-align: center;
    }
    .login-box h1 {
      margin-bottom: 10px;
    }
    .login-box input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      outline: none;
    }
    .login-box input:focus {
      border-color: #4a90e2;
    }
    .login-box button {
      width: 100%;
      padding: 10px;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
       border-radius: 20px;
    }
    .login-box button:hover {
      background: #357abd;
    }
     .login-box a {
      color: #4a90e2;
      text-decoration: none;
    }
    .login-box a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>Login</h1>
    <form>
      <input type="email" placeholder="Enter your email" required>
      <input type="password" placeholder="Enter password" required>
      <button type="submit">Login</button>
    </form>
    <p>Don't have an account? <a href="start-now.html">Sign Up</a></p>
  </div>
</body>
</html>
