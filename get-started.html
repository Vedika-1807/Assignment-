<!DOCTYPE html>
<html>
<head>
  <title>Get Started</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #6a11cb, #2575fc);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .start-box {
      width: 350px;
      padding: 30px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      text-align: center;
    }
    .start-box h1 {
      margin-bottom: 10px;
    }
    .start-box p {
      color: #555;
      margin-bottom: 20px;
    }
    .start-box ul {
      text-align: left;
      margin-bottom: 20px;
    }
    .start-box li {
      margin: 8px 0;
    }
    .start-box button {
      width: 100%;
      padding: 10px;
      background: #2575fc;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
       border-radius: 20px;
    }
    .start-box button:hover {
      background: #1a5edb;
    }
    .start-box a {
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="start-box">
    <h1>Get Started </h1>
    <p>Begin your DSA journey and stay consistent every day.</p>
    <ul>
      <li> Track daily problems</li>
      <li> Build strong streaks</li>
      <li> Monitor your progress</li>
    </ul>
    <a href="start-now.html">
      <button>Continue</button>
    </a>
  </div>
</body>
</html>
