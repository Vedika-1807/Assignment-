<!DOCTYPE html>
<html>
<head>
  <title>Get Start Now</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="form-page">
<h1>Create Your Account</h1>
  <p>Start your DSA journey today </p>
  <form class="form-box">
    <label>Full Name:</label><br>
    <input type="text" placeholder="Enter your name" required><br><br>
    <label>Email:</label><br>
    <input type="email" placeholder="Enter your email" required><br><br>
    <label>Password:</label><br>
    <input type="password" placeholder="Enter password" required><br><br>
    <label>Confirm Password:</label><br>
    <input type="password" placeholder="Confirm password" required><br><br>
    <button type="submit">Sign Up</button>
  </form>
  <p>Already have an account? <a href="login.html">Login</a></p>
</body>
</html>
